<!DOCTYPE html>
<html>
<head>
    <title>AJAX Weather Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        input {
            padding: 8px;
            width: 250px;
        }

        button {
            padding: 8px 12px;
        }

        .weather-box {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 300px;
        }

        .loading {
            color: blue;
            font-weight: bold;
        }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Weather Information Dashboard</h2>

<input type="text" id="cityInput" placeholder="Enter city name">
<button onclick="getWeather()">Search</button>

<div id="message"></div>
<div id="weatherResult"></div>

<script>

const apiKey = "YOUR_API_KEY_HERE";  // 🔹 Replace with your API key
const messageDiv = document.getElementById("message");
const resultDiv = document.getElementById("weatherResult");

let cachedCity = null;
let cachedData = null;

// AJAX GET request using Fetch API
function getWeather() {

    const city = document.getElementById("cityInput").value.trim();

    if (city === "") return;

    // Check cache first
    if (city === cachedCity && cachedData !== null) {
        displayWeather(cachedData);
        return;
    }

    messageDiv.innerHTML = "<p class='loading'>Loading...</p>";
    resultDiv.innerHTML = "";

    const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

    fetch(url)
        .then(response => {

            if (!response.ok) {
                if (response.status === 404) {
                    throw new Error("City not found (404)");
                } else {
                    throw new Error("Server error");
                }
            }

            return response.json();
        })
        .then(data => {

            // Cache result
            cachedCity = city;
            cachedData = data;

            displayWeather(data);
        })
        .catch(error => {
            messageDiv.innerHTML = `<p class="error">${error.message}</p>`;
        });
}

// Display weather data dynamically
function displayWeather(data) {

    messageDiv.innerHTML = "";

    const temperature = data.main.temp;
    const humidity = data.main.humidity;
    const condition = data.weather[0].description;

    resultDiv.innerHTML = `
        <div class="weather-box">
            <p><strong>Temperature:</strong> ${temperature} °C</p>
            <p><strong>Humidity:</strong> ${humidity}%</p>
            <p><strong>Condition:</strong> ${condition}</p>
        </div>
    `;
}

</script>

</body>
</html>
